name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-image-metadata
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, xeon]
    steps:
      - name: Deploy image-metadata to Xeon
        run: |
          set -euo pipefail
          COMPOSE_DIR="/etc/dokploy/compose/compose-override-1080p-monitor-d9x6az/code"
          PROJECT="compose-override-1080p-monitor-d9x6az"
          COMPOSE_FILE="docker-compose.prod.yml"
          cd "$COMPOSE_DIR"
          git fetch origin main && git reset --hard origin/main
          docker compose -f "$COMPOSE_FILE" -p "$PROJECT" build
          docker compose -f "$COMPOSE_FILE" -p "$PROJECT" up -d
          echo "Checking containers are running..."
          sleep 10
          FAILED=$(docker compose -f "$COMPOSE_FILE" -p "$PROJECT" ps --status exited --quiet | wc -l)
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED container(s) exited after deploy"
            docker compose -f "$COMPOSE_FILE" -p "$PROJECT" logs --tail=50
            exit 1
          fi
          echo "Deploy completed successfully"
